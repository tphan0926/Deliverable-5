version: "3.8"

services:
  db:
    image: postgres:15
    container_name: my_project_db
    environment:
      POSTGRES_USER: student1
      POSTGRES_PASSWORD: student123
      POSTGRES_DB: projectdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: umbc_lost_found_app
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  db_data: